name = "sendit"
main = "src/index.ts"
compatibility_date = "2025-12-15"
account_id = "facf6619808dc039df729531bbb26d1d"
workers_dev = true
preview_urls = true

[build]
command = "npm run build:frontend"

[[routes]]
pattern = "sendit.emilycogsdill.com"
custom_domain = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "sendit-photos"

[[d1_databases]]
binding = "DB"
database_name = "sendit-db"
database_id = "8237d120-ac99-4b30-9a58-6b7dea887524"
migrations_dir = "migrations"

[dev]
port = 8788
