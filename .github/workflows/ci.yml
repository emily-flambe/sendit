name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:frontend

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Uploads a preview version (unique URL, does not touch production traffic)
  # and posts/updates a sticky PR comment with the link.
  preview:
    name: Preview Deploy
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Skip gracefully (with a warning) until the CLOUDFLARE_API_TOKEN secret exists.
      - name: Check for Cloudflare token
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set; skipping preview deploy."
          fi
      - uses: actions/checkout@v4
        if: steps.creds.outputs.present == 'true'
      - uses: actions/setup-node@v4
        if: steps.creds.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm
      - if: steps.creds.outputs.present == 'true'
        run: npm ci
      - name: Upload preview version
        id: version
        if: steps.creds.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          OUTPUT=$(npx wrangler versions upload 2>&1)
          CODE=$?
          set -e
          echo "$OUTPUT"
          if [ "$CODE" -ne 0 ]; then
            echo "::error::wrangler versions upload failed"
            exit "$CODE"
          fi
          URL=$(echo "$OUTPUT" | grep -m1 'Version Preview URL:' | sed 's/.*Version Preview URL: *//')
          if [ -z "$URL" ]; then
            URL=$(echo "$OUTPUT" | grep -om1 'https://[^ ]*\.workers\.dev')
          fi
          if [ -z "$URL" ]; then
            echo "::error::Could not extract a preview URL from wrangler output"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        if: steps.version.outputs.url
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.version.outputs.url }}
        with:
          script: |
            const marker = '<!-- sendit-preview -->';
            const url = process.env.PREVIEW_URL;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '### Preview deployed',
              '',
              `**${url}**`,
              '',
              `Commit \`${sha}\`.`,
              '',
              '> Previews share the **production** D1 database and R2 bucket. Migrations added in this PR are NOT applied until merge.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check for Cloudflare token
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set; skipping deploy (deploy manually with npm run deploy)."
          fi
      - uses: actions/checkout@v4
        if: steps.creds.outputs.present == 'true'
      - uses: actions/setup-node@v4
        if: steps.creds.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm
      - if: steps.creds.outputs.present == 'true'
        run: npm ci
      - name: Apply D1 migrations
        if: steps.creds.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply sendit-db --remote
      - name: Deploy worker
        if: steps.creds.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
      - name: Verify production health
        if: steps.creds.outputs.present == 'true'
        run: |
          sleep 5
          curl -fsS https://sendit.emilycogsdill.com/api/health
